data:
  train_index: data/processed/train.parquet
  val_index: data/processed/val.parquet
  roi_size: 224

model:
  backbone: convnext_tiny
  pretrained: true
  drop_rate: 0.1

train:
  batch_size: 64
  num_workers: 8
  epochs: 30
  lr: 3.0e-4
  weight_decay: 0.05

  # Imbalance: false calls outnumber true defects ~2:1 typical.
  # Use class weights or focal loss before tuning threshold for low escape rate.
  class_weights: null

eval:
  # Hard ceiling on escape rate — a true defect slipping through is the worst error.
  max_escape_rate: 0.005
  optimize_for: false_call_reduction
